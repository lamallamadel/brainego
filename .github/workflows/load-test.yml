name: K6 Load Testing - SLO Validation (Master Merge)

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      force_run:
        description: 'Force run even if health checks fail'
        required: false
        default: false
        type: boolean

env:
  STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL || 'https://api-staging.brainego.io' }}
  STAGING_GATEWAY_URL: ${{ secrets.STAGING_GATEWAY_URL || 'https://gateway-staging.brainego.io' }}
  STAGING_MCP_URL: ${{ secrets.STAGING_MCP_URL || 'https://mcp-staging.brainego.io' }}
  PROMETHEUS_PUSHGATEWAY: ${{ secrets.PROMETHEUS_PUSHGATEWAY || 'http://pushgateway.brainego.io:9091' }}

jobs:
  load-test:
    name: K6 Load Test - SLO Validation
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    permissions:
      contents: read
      issues: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          # Install k6
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6 jq bc curl
          
          # Verify installations
          k6 version
          jq --version
          bc --version
      
      - name: Display test configuration
        run: |
          echo "=== Load Test Configuration ==="
          echo "Environment: ${{ github.event.inputs.environment || 'staging' }}"
          echo "Base URL: $STAGING_BASE_URL"
          echo "Gateway URL: $STAGING_GATEWAY_URL"
          echo "MCP URL: $STAGING_MCP_URL"
          echo "Pushgateway: $PROMETHEUS_PUSHGATEWAY"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Trigger: ${{ github.event_name }}"
          echo "Force Run: ${{ github.event.inputs.force_run || 'false' }}"
          echo "==============================="
      
      - name: Run k6 load test suite
        id: load_test
        continue-on-error: true
        env:
          STAGING_BASE_URL: ${{ env.STAGING_BASE_URL }}
          STAGING_GATEWAY_URL: ${{ env.STAGING_GATEWAY_URL }}
          STAGING_MCP_URL: ${{ env.STAGING_MCP_URL }}
          PROMETHEUS_PUSHGATEWAY: ${{ env.PROMETHEUS_PUSHGATEWAY }}
          K6_FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}
          K6_ABORT_ON_HEALTHCHECK_FAILURE: 'true'
        run: |
          chmod +x ./scripts/load_test/run_k6_suite.sh
          ./scripts/load_test/run_k6_suite.sh
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            load_test_results/
          retention-days: 30
          compression-level: 9
      
      - name: Create issue on SLO failure
        if: failure() && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Find and read the failure report
            const resultsDir = 'load_test_results';
            const reportPath = path.join(resultsDir, 'slo_failure_report.md');
            
            let reportBody = '';
            if (fs.existsSync(reportPath)) {
              reportBody = fs.readFileSync(reportPath, 'utf8');
            } else {
              reportBody = `## 🚨 Load Test Failed on Master Branch\n\n` +
                `**Severity:** CRITICAL\n` +
                `**Commit:** ${{ github.sha }}\n` +
                `**Branch:** ${{ github.ref_name }}\n` +
                `**Workflow:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n` +
                `**Timestamp:** ${new Date().toISOString()}\n\n` +
                `SLO thresholds were violated. See workflow logs for details.\n`;
            }
            
            const title = `🚨 Load Test SLO Failure - ${new Date().toISOString().split('T')[0]}`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: reportBody,
              labels: ['performance', 'slo-violation', 'critical', 'load-test']
            });


  nightly-load-test:
    name: K6 Nightly Suite
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6 jq bc curl

      - name: Run k6 nightly suite
        env:
          K6_ABORT_ON_HEALTHCHECK_FAILURE: 'true'
          K6_FORCE_RUN: 'false'
        run: |
          chmod +x ./scripts/load_test/run_k6_nightly_suite.sh
          ./scripts/load_test/run_k6_nightly_suite.sh

      - name: Upload nightly results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-nightly-results-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            load_test_results/
          retention-days: 30
          compression-level: 9
