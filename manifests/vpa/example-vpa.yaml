# Example VPA manifests
# Generated by: scripts/observability/apply_vpa_recommendations.py
# This is a reference example - actual manifests are generated dynamically

# Example 1: Auto Mode for Stateless Service (api-server)
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: api-server-vpa
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: api-server
    app.kubernetes.io/component: vpa
    app.kubernetes.io/managed-by: vpa-automation
    generated-by: apply_vpa_recommendations.py
    generated-at: "2025-01-01T00:00:00Z"
  annotations:
    vpa.automation/source: analyze_resource_usage.py
    vpa.automation/dry-run: "false"
    vpa.automation/cpu-current: "1.0"
    vpa.automation/cpu-recommended: "0.54"
    vpa.automation/memory-current-gi: "2.0"
    vpa.automation/memory-recommended-gi: "1.44"
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-server
  updatePolicy:
    updateMode: Auto
  resourcePolicy:
    containerPolicies:
      - containerName: api-server
        minAllowed:
          cpu: 378m
          memory: 1008Mi
        maxAllowed:
          cpu: 702m
          memory: 1872Mi
        controlledResources:
          - cpu
          - memory

# Example 2: Initial Mode for StatefulSet (redis)
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: redis-vpa
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: vpa
    app.kubernetes.io/managed-by: vpa-automation
    generated-by: apply_vpa_recommendations.py
    generated-at: "2025-01-01T00:00:00Z"
  annotations:
    vpa.automation/source: analyze_resource_usage.py
    vpa.automation/dry-run: "false"
    vpa.automation/cpu-current: "1.0"
    vpa.automation/cpu-recommended: "0.42"
    vpa.automation/memory-current-gi: "2.0"
    vpa.automation/memory-recommended-gi: "1.2"
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: redis
  updatePolicy:
    updateMode: Initial  # No automatic restarts for StatefulSets
  resourcePolicy:
    containerPolicies:
      - containerName: redis
        minAllowed:
          cpu: 294m
          memory: 840Mi
        maxAllowed:
          cpu: 546m
          memory: 1560Mi
        controlledResources:
          - cpu
          - memory

---
# Key differences between Auto and Initial modes:
#
# Auto Mode (api-server):
# - Automatically evicts and recreates pods when recommendations change
# - Best for stateless services that can tolerate brief restarts
# - Continuously optimized based on actual usage
#
# Initial Mode (redis):
# - Only applies recommendations to NEW pods (not existing ones)
# - Best for StatefulSets (databases) that should not restart automatically
# - Requires manual pod restart to apply new recommendations
# - Safer for data-critical services
