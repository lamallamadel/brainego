# Prometheus Configuration for Multi-Region Monitoring
# Includes federation, remote write, and cross-region metrics

global:
  scrape_interval: 30s
  scrape_timeout: 10s
  evaluation_interval: 30s
  external_labels:
    cluster: ai-platform
    region: us-west-1  # Override per region deployment
    environment: production

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
      timeout: 10s

# Rule files for alerts
rule_files:
  - /etc/prometheus/rules/*.yml

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # Kubernetes API server
  - job_name: kubernetes-apiservers
    kubernetes_sd_configs:
      - role: endpoints
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
        action: keep
        regex: default;kubernetes;https

  # Kubernetes nodes
  - job_name: kubernetes-nodes
    kubernetes_sd_configs:
      - role: node
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)

  # Kubernetes pods
  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: kubernetes_pod_name

  # Gateway service
  - job_name: gateway
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - ai-platform
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
        action: keep
        regex: gateway
      - source_labels: [__meta_kubernetes_pod_container_port_number]
        action: keep
        regex: "9002"
      - source_labels: [__meta_kubernetes_pod_label_region]
        target_label: region

  # Agent Router service
  - job_name: agent-router
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - ai-platform
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
        action: keep
        regex: agent-router
      - source_labels: [__meta_kubernetes_pod_container_port_number]
        action: keep
        regex: "8001"
      - source_labels: [__meta_kubernetes_pod_label_region]
        target_label: region

  # MAX Serve instances
  - job_name: max-serve
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - ai-platform
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
        action: keep
        regex: max-serve-.*
      - source_labels: [__meta_kubernetes_pod_label_region]
        target_label: region
      - source_labels: [__meta_kubernetes_pod_label_model]
        target_label: model

  # PostgreSQL
  - job_name: postgres
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - ai-platform
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
        action: keep
        regex: postgres
      - source_labels: [__meta_kubernetes_pod_label_region]
        target_label: region
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: pg_.*
        action: keep

  # Qdrant
  - job_name: qdrant
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - ai-platform
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
        action: keep
        regex: qdrant
      - source_labels: [__meta_kubernetes_pod_label_region]
        target_label: region
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: qdrant_.*
        action: keep

  # Redis
  - job_name: redis
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - ai-platform
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
        action: keep
        regex: redis
      - source_labels: [__meta_kubernetes_pod_label_region]
        target_label: region

  # Kong Ingress
  - job_name: kong
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - ai-platform
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: kong
      - source_labels: [__meta_kubernetes_pod_label_region]
        target_label: region

  # Cross-region federation (scrape from other regions)
  - job_name: federate-us-east-1
    honor_labels: true
    metrics_path: /federate
    params:
      match[]:
        - '{job=~"gateway|agent-router|postgres|qdrant|redis"}'
        - '{__name__=~"region_health_status|geo_routing_.*|pg_replication_lag_seconds|qdrant_replication_lag_seconds"}'
    static_configs:
      - targets:
          - prometheus.us-east-1.ai-platform.svc.cluster.local:9090
        labels:
          region: us-east-1

  - job_name: federate-eu-west-1
    honor_labels: true
    metrics_path: /federate
    params:
      match[]:
        - '{job=~"gateway|agent-router|postgres|qdrant|redis"}'
        - '{__name__=~"region_health_status|geo_routing_.*|pg_replication_lag_seconds|qdrant_replication_lag_seconds"}'
    static_configs:
      - targets:
          - prometheus.eu-west-1.ai-platform.svc.cluster.local:9090
        labels:
          region: eu-west-1

  - job_name: federate-ap-southeast-1
    honor_labels: true
    metrics_path: /federate
    params:
      match[]:
        - '{job=~"gateway|agent-router|postgres|qdrant|redis"}'
        - '{__name__=~"region_health_status|geo_routing_.*|pg_replication_lag_seconds|qdrant_replication_lag_seconds"}'
    static_configs:
      - targets:
          - prometheus.ap-southeast-1.ai-platform.svc.cluster.local:9090
        labels:
          region: ap-southeast-1

# Remote write configuration (for long-term storage)
remote_write:
  - url: http://thanos-receive:19291/api/v1/receive
    queue_config:
      capacity: 10000
      max_shards: 50
      min_shards: 1
      max_samples_per_send: 5000
      batch_send_deadline: 5s
      min_backoff: 30ms
      max_backoff: 100ms
    write_relabel_configs:
      - source_labels: [__name__]
        regex: (region_health_status|geo_routing_.*|pg_replication_lag_seconds|qdrant_replication_lag_seconds|cross_region_requests_total)
        action: keep

# Remote read configuration (for querying historical data)
remote_read:
  - url: http://thanos-query:9090/api/v1/read
    read_recent: true
