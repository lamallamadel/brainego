# Docker Compose Override for Observability Stack
# Use with: docker-compose -f docker-compose.yml -f docker-compose.observability.yml up -d

version: '3.8'

services:
  # Ensure all services have metrics endpoints exposed
  gateway:
    environment:
      - ENABLE_METRICS=true
      - METRICS_PORT=9002

  mcpjungle-gateway:
    environment:
      - ENABLE_METRICS=true
      - METRICS_PORT=9100

  api-server:
    environment:
      - ENABLE_METRICS=true
      - METRICS_PORT=8000

  learning-engine:
    environment:
      - ENABLE_METRICS=true
      - METRICS_PORT=8003

  drift-monitor:
    environment:
      - ENABLE_METRICS=true
      - METRICS_PORT=8004

  data-collection:
    environment:
      - ENABLE_METRICS=true
      - METRICS_PORT=8002

  maml-service:
    environment:
      - ENABLE_METRICS=true
      - METRICS_PORT=8005

  # cAdvisor - Container metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: cadvisor
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true
    networks:
      - ai-platform-net

  # Node Exporter - Host metrics
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: node-exporter
    restart: always
    ports:
      - "9100:9100"
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - ai-platform-net

  # AlertManager - Alert routing and notifications
  alertmanager:
    volumes:
      - ./configs/alertmanager:/etc/alertmanager:ro
      - alertmanager-data:/alertmanager
    environment:
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - ONCALL_EMAIL_PRIMARY=${ONCALL_EMAIL_PRIMARY:-oncall@example.com}
      - ONCALL_EMAIL_SECONDARY=${ONCALL_EMAIL_SECONDARY:-oncall-backup@example.com}
      - MANAGEMENT_EMAIL_LIST=${MANAGEMENT_EMAIL_LIST:-management@example.com}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  ai-platform-net:
    external: true

volumes:
  alertmanager-data:
    driver: local
