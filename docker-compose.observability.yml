# Docker Compose Override for Observability Stack
# Use with: docker-compose -f docker-compose.yml -f docker-compose.observability.yml up -d

version: '3.8'

services:
  # Ensure all services have metrics endpoints exposed
  gateway:
    environment:
      - ENABLE_METRICS=true
      - METRICS_PORT=9002

  mcpjungle-gateway:
    environment:
      - ENABLE_METRICS=true
      - METRICS_PORT=9100

  api-server:
    environment:
      - ENABLE_METRICS=true
      - METRICS_PORT=8000

  learning-engine:
    environment:
      - ENABLE_METRICS=true
      - METRICS_PORT=8003

  drift-monitor:
    environment:
      - ENABLE_METRICS=true
      - METRICS_PORT=8004

  data-collection:
    environment:
      - ENABLE_METRICS=true
      - METRICS_PORT=8002

  maml-service:
    environment:
      - ENABLE_METRICS=true
      - METRICS_PORT=8005

  # cAdvisor - Container metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: cadvisor
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true
    networks:
      - brainego

  # Node Exporter - Host metrics
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: node-exporter
    restart: always
    ports:
      - "9100:9100"
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - brainego

networks:
  brainego:
    external: true
