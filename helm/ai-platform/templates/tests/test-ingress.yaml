{{- if .Values.kong.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-test-ingress"
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  serviceAccountName: {{ .Release.Name }}-test-sa
  containers:
    - name: test-ingress
      image: bitnami/kubectl:latest
      command:
        - /bin/sh
        - -c
        - |
          echo "Testing Ingress configuration..."
          
          # Get Ingress resources
          INGRESSES=$(kubectl get ingress -n {{ .Values.namespace.name }} -o json)
          
          # Check if any Ingresses exist
          INGRESS_COUNT=$(echo "$INGRESSES" | jq '.items | length')
          
          if [ "$INGRESS_COUNT" -eq 0 ]; then
            echo "Error: No Ingress resources found"
            exit 1
          fi
          
          echo "Found $INGRESS_COUNT Ingress resource(s)"
          
          # Check TLS configuration
          echo "Checking TLS configuration..."
          
          TLS_COUNT=$(echo "$INGRESSES" | jq '[.items[].spec.tls // []] | add | length')
          
          if [ "$TLS_COUNT" -eq 0 ]; then
            echo "Warning: No TLS configuration found in Ingress"
          else
            echo "✓ TLS configured ($TLS_COUNT host(s))"
          fi
          
          # Check cert-manager annotations
          echo "Checking cert-manager annotations..."
          
          CERT_MANAGER_ISSUER=$(echo "$INGRESSES" | jq -r '.items[0].metadata.annotations["cert-manager.io/cluster-issuer"] // empty')
          
          if [ -z "$CERT_MANAGER_ISSUER" ]; then
            echo "Warning: No cert-manager issuer annotation found"
          else
            echo "✓ Cert-manager issuer: $CERT_MANAGER_ISSUER"
          fi
          
          # Check Kong plugins
          echo "Checking Kong plugin configuration..."
          
          KONG_PLUGINS=$(echo "$INGRESSES" | jq -r '.items[0].metadata.annotations["konghq.com/plugins"] // empty')
          
          if [ -z "$KONG_PLUGINS" ]; then
            echo "Warning: No Kong plugins configured"
          else
            echo "✓ Kong plugins: $KONG_PLUGINS"
          fi
          
          # List all Ingress resources with their hosts
          echo "Ingress Resources:"
          echo "$INGRESSES" | jq -r '.items[] | "\(.metadata.name): \(.spec.rules[].host // "no-host")"'
          
          echo "Ingress configuration tests passed!"
{{- end }}
