apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-test-statefulsets"
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  serviceAccountName: {{ .Release.Name }}-test-sa
  containers:
    - name: test-statefulsets
      image: bitnami/kubectl:latest
      command:
        - /bin/sh
        - -c
        - |
          echo "Testing StatefulSet readiness..."
          
          {{- if .Values.postgres.enabled }}
          echo "Checking Postgres StatefulSet..."
          kubectl get statefulset postgres -n {{ .Values.namespace.name }} -o json | \
            jq -e '.status.readyReplicas == .spec.replicas' || exit 1
          echo "✓ Postgres StatefulSet ready"
          {{- end }}
          
          {{- if .Values.qdrant.enabled }}
          echo "Checking Qdrant StatefulSet..."
          kubectl get statefulset qdrant -n {{ .Values.namespace.name }} -o json | \
            jq -e '.status.readyReplicas == .spec.replicas' || exit 1
          echo "✓ Qdrant StatefulSet ready"
          {{- end }}
          
          {{- if .Values.neo4j.enabled }}
          echo "Checking Neo4j StatefulSet..."
          kubectl get statefulset neo4j -n {{ .Values.namespace.name }} -o json | \
            jq -e '.status.readyReplicas == .spec.replicas' || exit 1
          echo "✓ Neo4j StatefulSet ready"
          {{- end }}
          
          {{- if .Values.redis.enabled }}
          echo "Checking Redis StatefulSet..."
          kubectl get statefulset redis -n {{ .Values.namespace.name }} -o json | \
            jq -e '.status.readyReplicas == .spec.replicas' || exit 1
          echo "✓ Redis StatefulSet ready"
          {{- end }}
          
          echo "All StatefulSets are ready!"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: "{{ .Release.Name }}-test-sa"
  namespace: {{ .Values.namespace.name }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: "{{ .Release.Name }}-test-role"
  namespace: {{ .Values.namespace.name }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: "{{ .Release.Name }}-test-rolebinding"
  namespace: {{ .Values.namespace.name }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: "{{ .Release.Name }}-test-sa"
    namespace: {{ .Values.namespace.name }}
roleRef:
  kind: Role
  name: "{{ .Release.Name }}-test-role"
  apiGroup: rbac.authorization.k8s.io
