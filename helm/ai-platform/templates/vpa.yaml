{{- if .Values.vpa.enabled -}}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: gateway-vpa
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/component: vpa
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway
  updatePolicy:
    updateMode: {{ .Values.vpa.updateMode | default "Auto" }}
  resourcePolicy:
    containerPolicies:
      - containerName: gateway
        minAllowed:
          cpu: {{ .Values.vpa.gateway.minAllowed.cpu | default "100m" }}
          memory: {{ .Values.vpa.gateway.minAllowed.memory | default "256Mi" }}
        maxAllowed:
          cpu: {{ .Values.vpa.gateway.maxAllowed.cpu | default "2" }}
          memory: {{ .Values.vpa.gateway.maxAllowed.memory | default "4Gi" }}
        controlledResources:
          - cpu
          - memory
