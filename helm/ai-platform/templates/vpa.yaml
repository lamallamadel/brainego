# VPA for api-server (updateMode: Auto)
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: api-server-vpa
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/name: api-server
    app.kubernetes.io/component: vpa
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-server
  updatePolicy:
    updateMode: {{ .Values.vpa.apiServer.updateMode | default "Auto" }}
  resourcePolicy:
    containerPolicies:
      - containerName: api-server
        minAllowed:
          cpu: {{ .Values.vpa.apiServer.minAllowed.cpu | default "100m" }}
          memory: {{ .Values.vpa.apiServer.minAllowed.memory | default "256Mi" }}
        maxAllowed:
          cpu: {{ .Values.vpa.apiServer.maxAllowed.cpu | default "2" }}
          memory: {{ .Values.vpa.apiServer.maxAllowed.memory | default "4Gi" }}
        controlledResources:
          - cpu
          - memory
---
