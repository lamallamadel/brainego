# Multi-Region Deployment Values for AI Platform
# Optimized for geo-distributed deployments with cross-region replication

# Global settings
global:
  namespace: ai-platform
  region: us-west-1  # Override per region deployment
  multiRegion:
    enabled: true
    primaryRegion: us-west-1
    regions:
      - us-west-1
      - us-east-1
      - eu-west-1
      - ap-southeast-1
    replicationStrategy: async  # async or sync

# Namespace configuration
namespace:
  create: true
  name: ai-platform

# Image pull secrets
imagePullSecrets: []

# Network Policies Configuration
networkPolicies:
  enabled: true
  defaultDeny: true
  allowDNS: true
  allowCrossRegion: true  # Allow cross-region communication

# RBAC Configuration
rbac:
  enabled: true
  serviceAccounts:
    gateway:
      create: true
      automountServiceAccountToken: true
      annotations:
        iam.gke.io/gcp-service-account: gateway-sa@project.iam.gserviceaccount.com
    agentRouter:
      create: true
      automountServiceAccountToken: true
    mcpjungle:
      create: true
      automountServiceAccountToken: true
    maxServeLlama:
      create: true
      automountServiceAccountToken: false
    maxServeQwen:
      create: true
      automountServiceAccountToken: false
    maxServeDeepseek:
      create: true
      automountServiceAccountToken: false
    learningEngine:
      create: true
      automountServiceAccountToken: true
    mamlService:
      create: true
      automountServiceAccountToken: true
    mem0:
      create: true
      automountServiceAccountToken: true
    postgres:
      create: true
      automountServiceAccountToken: true
    redis:
      create: true
      automountServiceAccountToken: false
    qdrant:
      create: true
      automountServiceAccountToken: true
    neo4j:
      create: true
      automountServiceAccountToken: false
    minio:
      create: true
      automountServiceAccountToken: false
    prometheus:
      create: true
      automountServiceAccountToken: true
    grafana:
      create: true
      automountServiceAccountToken: true
    jaeger:
      create: true
      automountServiceAccountToken: false

# MAX Serve - Llama 3.3 8B (GPU node affinity)
maxServeLlama:
  enabled: true
  replicaCount: 2
  image:
    repository: modular/max-serve
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  resources:
    limits:
      nvidia.com/gpu: 1
      memory: 16Gi
      cpu: 8
    requests:
      nvidia.com/gpu: 1
      memory: 8Gi
      cpu: 4
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    scaleUpStabilizationWindowSeconds: 60
    scaleDownStabilizationWindowSeconds: 300
    customMetrics:
      enabled: true
      inferenceQueueDepthThreshold: 10
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  # Regional GPU node affinity
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node.kubernetes.io/instance-type
                operator: In
                values:
                  - gpu-accelerated
                  - p3.2xlarge
                  - g4dn.xlarge
                  - n1-standard-4-nvidia-tesla-t4
              - key: topology.kubernetes.io/region
                operator: In
                values:
                  - "{{ .Values.global.region }}"
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - max-serve-llama
            topologyKey: kubernetes.io/hostname
  env:
    - name: NVIDIA_VISIBLE_DEVICES
      value: "all"
    - name: CUDA_VISIBLE_DEVICES
      value: "0"
    - name: REGION
      value: "{{ .Values.global.region }}"
  args:
    - max-serve
    - --model-path
    - /models/llama-3.3-8b-instruct-q4_k_m.gguf
    - --host
    - "0.0.0.0"
    - --port
    - "8080"
    - --max-batch-size
    - "32"
    - --max-waiting-time
    - "10"
    - --max-tokens
    - "2048"
  persistence:
    models:
      enabled: true
      existingClaim: ""
      storageClass: "regional-ssd"  # Regional persistent disk
      size: 50Gi
      mountPath: /models
    configs:
      enabled: true
      existingClaim: ""
      storageClass: "regional-ssd"
      size: 1Gi
      mountPath: /configs
    logs:
      enabled: true
      existingClaim: ""
      storageClass: "regional-ssd"
      size: 10Gi
      mountPath: /logs
  livenessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5

