  postgres:
    username: YWlfdXNlcg==
    password: YWlfcGFzc3dvcmQ=
    database: YWlfcGxhdGZvcm0=
    replicationUser: cmVwbGljYXRpb25fdXNlcg==
    replicationPassword: cmVwbGljYXRpb25fcGFzc3dvcmQ=
  neo4j:
    username: bmVvNGo=
    password: bmVvNGpfcGFzc3dvcmQ=
  minio:
    accessKey: bWluaW9hZG1pbg==
    secretKey: bWluaW9hZG1pbjEyMw==
  grafana:
    username: YWRtaW4=
    password: YWRtaW4=

# ConfigMaps
configMaps:
  agentRouter:
    enabled: true
  mcpServers:
    enabled: true
  mcpAcl:
    enabled: true
  prometheus:
    enabled: true
  grafana:
    enabled: true
  geoRouting:
    enabled: true

# DNS Configuration
dns:
  enabled: true
  provider: route53  # route53, cloudflare, google-cloud-dns
  domain: ai-platform.example.com
  failover:
    enabled: true
    healthCheckPath: /health
    healthCheckPort: 9002
    healthCheckInterval: 30
  geolocation:
    enabled: true
    policy: latency  # latency or geoproximity

# Cross-Region Monitoring
monitoring:
  crossRegion:
    enabled: true
    exporters:
      - type: prometheus
        endpoint: http://prometheus:9090
      - type: datadog
        enabled: false
      - type: cloudwatch
        enabled: false
    metrics:
      - cross_region_latency
      - replication_lag_seconds
      - region_failover_count
      - region_health_status
