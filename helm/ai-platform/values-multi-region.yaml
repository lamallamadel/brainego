# Agent Router API Server
agentRouter:
  enabled: true
  replicaCount: 3
  image:
    repository: ai-platform/api-server
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000
    metricsPort: 8001
  resources:
    limits:
      memory: 4Gi
      cpu: 2
    requests:
      memory: 2Gi
      cpu: 1
  podDisruptionBudget:
    enabled: true
    minAvailable: 2
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - agent-router
            topologyKey: kubernetes.io/hostname
  env:
    - name: AGENT_ROUTER_CONFIG
      value: /app/configs/agent-router.yaml
    - name: QDRANT_HOST
      value: qdrant
    - name: QDRANT_PORT
      value: "6333"
    - name: QDRANT_COLLECTION
      value: documents
    - name: REDIS_HOST
      value: redis
    - name: REDIS_PORT
      value: "6379"
    - name: REDIS_DB
      value: "0"
    - name: POSTGRES_HOST
      value: postgres
    - name: POSTGRES_PORT
      value: "5432"
    - name: POSTGRES_DB
      value: ai_platform
    - name: POSTGRES_USER
      value: ai_user
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: postgres-credentials
          key: password
    - name: REGION
      value: "{{ .Values.global.region }}"
  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 20
    periodSeconds: 30
    timeoutSeconds: 10
  readinessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5

# Gateway Service
gateway:
  enabled: true
  replicaCount: 3
  image:
    repository: ai-platform/gateway
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: LoadBalancer
    port: 9002
    targetPort: 9002
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: nlb
      service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
  resources:
    limits:
      memory: 2Gi
      cpu: 1
    requests:
      memory: 1Gi
      cpu: 500m
  podDisruptionBudget:
    enabled: true
    minAvailable: 2
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - gateway
            topologyKey: kubernetes.io/hostname
  env:
    - name: AGENT_ROUTER_CONFIG
      value: /app/configs/agent-router.yaml
    - name: QDRANT_HOST
      value: qdrant
    - name: QDRANT_PORT
      value: "6333"
    - name: REDIS_HOST
      value: redis
    - name: REDIS_PORT
      value: "6379"
    - name: REGION
      value: "{{ .Values.global.region }}"
  livenessProbe:
    httpGet:
      path: /health
      port: 9002
    initialDelaySeconds: 20
    periodSeconds: 30
    timeoutSeconds: 10
  readinessProbe:
    httpGet:
      path: /health
      port: 9002
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5

# Qdrant Vector Database (StatefulSet with cross-region replication)
qdrant:
  enabled: true
  replicaCount: 3
  image:
    repository: qdrant/qdrant
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 6333
    grpcPort: 6334
  resources:
    limits:
      memory: 16Gi
      cpu: 8
    requests:
      memory: 8Gi
      cpu: 4
  podDisruptionBudget:
    enabled: true
    minAvailable: 2
  # Regional storage affinity
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: topology.kubernetes.io/region
                operator: In
                values:
                  - "{{ .Values.global.region }}"
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - qdrant
          topologyKey: kubernetes.io/hostname
  env:
    - name: QDRANT__SERVICE__GRPC_PORT
      value: "6334"
    - name: QDRANT__CLUSTER__ENABLED
      value: "true"
    - name: QDRANT__CLUSTER__P2P__PORT
      value: "6335"
    - name: REGION
      value: "{{ .Values.global.region }}"
  persistence:
    enabled: true
    storageClass: "regional-pd-ssd"  # Regional persistent disk for stateful workloads
    size: 200Gi
    mountPath: /qdrant/storage
  # Cross-region replication configuration
  replication:
    enabled: true
    peers:
      - region: us-west-1
        endpoint: qdrant.us-west-1.ai-platform.svc.cluster.local:6334
      - region: us-east-1
        endpoint: qdrant.us-east-1.ai-platform.svc.cluster.local:6334
      - region: eu-west-1
        endpoint: qdrant.eu-west-1.ai-platform.svc.cluster.local:6334
      - region: ap-southeast-1
        endpoint: qdrant.ap-southeast-1.ai-platform.svc.cluster.local:6334
  livenessProbe:
    httpGet:
      path: /health
      port: 6333
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 10
  readinessProbe:
    httpGet:
      path: /health
      port: 6333
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5

# Redis Cache (StatefulSet)
redis:
  enabled: true
  replicaCount: 3
  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 6379
  resources:
    limits:
      memory: 8Gi
      cpu: 4
    requests:
      memory: 4Gi
      cpu: 2
  podDisruptionBudget:
    enabled: true
    minAvailable: 2
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - redis
          topologyKey: kubernetes.io/hostname
  args:
    - redis-server
    - --appendonly
    - "yes"
    - --maxmemory
    - 4gb
    - --maxmemory-policy
    - allkeys-lru
    - --save
    - "900 1 300 10 60 10000"
  persistence:
    enabled: true
    storageClass: "regional-pd-ssd"
    size: 20Gi
    mountPath: /data
  livenessProbe:
    exec:
      command:
        - redis-cli
        - ping
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 10
  readinessProbe:
    exec:
      command:
        - redis-cli
        - ping
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5

# PostgreSQL Database (StatefulSet with pglogical replication)
postgres:
  enabled: true
  replicaCount: 3
  image:
    repository: postgres
    tag: 15-alpine
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5432
  resources:
    limits:
      memory: 8Gi
      cpu: 4
    requests:
      memory: 4Gi
      cpu: 2
  podDisruptionBudget:
    enabled: true
    minAvailable: 2
  # Regional storage affinity for stateful workloads
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: topology.kubernetes.io/region
                operator: In
                values:
                  - "{{ .Values.global.region }}"
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - postgres
          topologyKey: kubernetes.io/hostname
  env:
    - name: POSTGRES_DB
      value: ai_platform
    - name: POSTGRES_USER
      value: ai_user
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: postgres-credentials
          key: password
    - name: PGDATA
      value: /var/lib/postgresql/data/pgdata
    # pglogical configuration
    - name: POSTGRES_INITDB_ARGS
      value: "--encoding=UTF8 --locale=en_US.UTF-8"
    - name: REGION
      value: "{{ .Values.global.region }}"
  persistence:
    enabled: true
    storageClass: "regional-pd-ssd"  # Regional persistent disk for database
    size: 100Gi
    mountPath: /var/lib/postgresql/data
  initScripts:
    enabled: true
    mountPath: /docker-entrypoint-initdb.d
  # Cross-region replication configuration
  replication:
    enabled: true
    mode: pglogical  # pglogical or patroni
    primaryRegion: us-west-1
    replicaRegions:
      - us-east-1
      - eu-west-1
      - ap-southeast-1
    # pglogical specific settings
    pglogical:
      providerDsn: "host=postgres.us-west-1.ai-platform.svc.cluster.local port=5432 dbname=ai_platform user=replication_user password=replication_password"
      subscriberDsn: "host=postgres port=5432 dbname=ai_platform user=ai_user"
      replicationSets:
        - default
        - ai_platform_set
  livenessProbe:
    exec:
      command:
        - /bin/sh
        - -c
        - pg_isready -U ai_user -d ai_platform
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 10
  readinessProbe:
    exec:
      command:
        - /bin/sh
        - -c
        - pg_isready -U ai_user -d ai_platform
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5

# Neo4j Knowledge Graph (StatefulSet)
neo4j:
  enabled: true
  replicaCount: 3
  image:
    repository: neo4j
    tag: 5.15-enterprise
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    httpPort: 7474
    boltPort: 7687
  resources:
    limits:
      memory: 16Gi
      cpu: 8
    requests:
      memory: 8Gi
      cpu: 4
  # Regional storage affinity
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: topology.kubernetes.io/region
                operator: In
                values:
                  - "{{ .Values.global.region }}"
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - neo4j
          topologyKey: kubernetes.io/hostname
  env:
    - name: NEO4J_AUTH
      value: neo4j/neo4j_password
    - name: NEO4J_dbms_memory_pagecache_size
      value: 2G
    - name: NEO4J_dbms_memory_heap_initial__size
      value: 2G
    - name: NEO4J_dbms_memory_heap_max__size
      value: 4G
    - name: NEO4J_dbms_mode
      value: CORE
    - name: NEO4J_causal__clustering_minimum__core__cluster__size__at__formation
      value: "3"
    - name: NEO4J_causal__clustering_initial__discovery__members
      value: neo4j-0.neo4j:5000,neo4j-1.neo4j:5000,neo4j-2.neo4j:5000
    - name: REGION
      value: "{{ .Values.global.region }}"
  persistence:
    data:
      enabled: true
      storageClass: "regional-pd-ssd"
      size: 100Gi
      mountPath: /data
    logs:
      enabled: true
      storageClass: "regional-pd-ssd"
      size: 10Gi
      mountPath: /logs
  livenessProbe:
    httpGet:
      path: /
      port: 7474
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
  readinessProbe:
    httpGet:
      path: /
      port: 7474
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5

# MinIO Object Storage (StatefulSet)
minio:
  enabled: true
  replicaCount: 3
  image:
    repository: minio/minio
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    apiPort: 9000
    consolePort: 9001
  resources:
    limits:
      memory: 8Gi
      cpu: 4
    requests:
      memory: 4Gi
      cpu: 2
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - minio
          topologyKey: kubernetes.io/hostname
  env:
    - name: MINIO_ROOT_USER
      valueFrom:
        secretKeyRef:
          name: minio-credentials
          key: accessKey
    - name: MINIO_ROOT_PASSWORD
      valueFrom:
        secretKeyRef:
          name: minio-credentials
          key: secretKey
    - name: REGION
      value: "{{ .Values.global.region }}"
  args:
    - server
    - /data
    - --console-address
    - ":9001"
  persistence:
    enabled: true
    storageClass: "regional-pd-ssd"
    size: 200Gi
    mountPath: /data
  livenessProbe:
    httpGet:
      path: /minio/health/live
      port: 9000
    initialDelaySeconds: 20
    periodSeconds: 30
    timeoutSeconds: 10
  readinessProbe:
    httpGet:
      path: /minio/health/live
      port: 9000
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5

# Prometheus Monitoring
prometheus:
  enabled: true
  replicaCount: 2
  image:
    repository: prom/prometheus
    tag: v2.48.0
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 9090
  resources:
    limits:
      memory: 8Gi
      cpu: 4
    requests:
      memory: 4Gi
      cpu: 2
  args:
    - --config.file=/etc/prometheus/prometheus.yml
    - --storage.tsdb.path=/prometheus
    - --storage.tsdb.retention.time=90d
    - --web.console.libraries=/usr/share/prometheus/console_libraries
    - --web.console.templates=/usr/share/prometheus/consoles
    - --web.enable-remote-write-receiver
  persistence:
    config:
      enabled: true
      storageClass: "regional-pd-ssd"
      size: 1Gi
      mountPath: /etc/prometheus
    data:
      enabled: true
      storageClass: "regional-pd-ssd"
      size: 100Gi
      mountPath: /prometheus
  # Federation configuration for cross-region metrics
  federation:
    enabled: true
    regions:
      - us-west-1
      - us-east-1
      - eu-west-1
      - ap-southeast-1
  livenessProbe:
    httpGet:
      path: /-/healthy
      port: 9090
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 10
  readinessProbe:
    httpGet:
      path: /-/healthy
      port: 9090
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5

# Grafana Dashboards
grafana:
  enabled: true
  replicaCount: 2
  image:
    repository: grafana/grafana
    tag: 10.2.2
    pullPolicy: IfNotPresent
  service:
    type: LoadBalancer
    port: 3000
  resources:
    limits:
      memory: 4Gi
      cpu: 2
    requests:
      memory: 2Gi
      cpu: 1
  env:
    - name: GF_SECURITY_ADMIN_USER
      value: admin
    - name: GF_SECURITY_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: grafana-credentials
          key: password
    - name: GF_USERS_ALLOW_SIGN_UP
      value: "false"
    - name: GF_SERVER_ROOT_URL
      value: http://localhost:3000
    - name: GF_INSTALL_PLUGINS
      value: grafana-postgresql-datasource,grafana-worldmap-panel
    - name: REGION
      value: "{{ .Values.global.region }}"
  persistence:
    data:
      enabled: true
      storageClass: "regional-pd-ssd"
      size: 20Gi
      mountPath: /var/lib/grafana
    provisioning:
      enabled: true
      storageClass: "regional-pd-ssd"
      size: 1Gi
      mountPath: /etc/grafana/provisioning
    dashboards:
      enabled: true
      storageClass: "regional-pd-ssd"
      size: 5Gi
      mountPath: /var/lib/grafana/dashboards
  livenessProbe:
    httpGet:
      path: /api/health
      port: 3000
    initialDelaySeconds: 20
    periodSeconds: 30
    timeoutSeconds: 10
  readinessProbe:
    httpGet:
      path: /api/health
      port: 3000
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5

